apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  labels:
    com.comarch.configuration/layer: system
  name: global-parameters-app
  namespace: argocd
spec:
  destination:
    namespace: test
    server: https://kubernetes.default.svc
  info:
    - name: description
      value: |
        The test instance
  project: cdi-base
  source:
    path: global-parameters
    repoURL: ssh://git@github.com/marcinkwapiszcomarch/test
    targetRevision: HEAD
    plugin:
      parameters:
        - name: values-files
          array:
            - deployments/values.yaml
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        com.comarch.configuration/deployment-type: tenant
        com.comarch.configuration/layer: system
