apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: global-parameters-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: in-cluster
            url: https://kubernetes.default.svc

  template:
    metadata:
      name: 'global-parameters-{{cluster}}'
    spec:
      project: default

      source:
        # TODO: Replace with your actual Git repository URL
        repoURL: https://github.com/<your-org>/<your-repo>.git
        targetRevision: HEAD
        path: global-parameters

        # ArgoCD Vault Plugin + Helm CMP
        # Flow: helm template -> argocd-vault-plugin generate
        # AVP substitutes placeholders from values.yaml with real secrets
        plugin:
          name: argocd-vault-plugin-helm
          env:
            - name: AVP_TYPE
              value: vault                          # TODO: vault | awssecretsmanager | gcpsecretmanager | azurekeyvault
            - name: VAULT_ADDR
              value: https://vault.example.com      # TODO: Replace with your Vault address
            - name: AVP_AUTH_TYPE
              value: k8s                            # TODO: k8s | approle | token | github | userpass
            - name: AVP_K8S_ROLE
              value: argocd                         # TODO: Replace with your Vault Kubernetes auth role
            - name: HELM_ARGS
              value: "-f values.yaml"

      destination:
        server: '{{url}}'
        namespace: argocd

      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

