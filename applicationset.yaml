apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: global-parameters-appset
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - cluster: in-cluster
            url: https://kubernetes.default.svc

  template:
    metadata:
      name: 'global-parameters-{{cluster}}'
    spec:
      project: default

      source:
        # TODO: Replace with your actual Git repository URL
        repoURL: ssh://git@github.com/marcinkwapiszcomarch/test
        targetRevision: HEAD
        path: global-parameters
      syncPolicy:
        syncOptions:
          - CreateNamespace=true